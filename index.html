<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Name the Gregorian chant from its opening notes. A liturgical trivia drill with notation and playback." />
  <title>Name That Chant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="console">
    <header class="masthead">
      <h1>Name That Chant</h1>
      <p class="subtitle">Read the chant &mdash; name it and its place in the liturgy.</p>
    </header>

    <section class="score-card">
      <div id="score" class="score" aria-label="Musical notation for the mystery chant"></div>
      <div class="score-tools">
        <button type="button" id="play-btn" class="ghost">▶ Hear it</button>
        <span id="play-note" class="play-note"></span>
      </div>
    </section>

    <section class="options" id="options" aria-label="Answer choices">
      <!-- option buttons injected by app.js -->
    </section>

    <section class="verdict">
      <p id="result" class="result" role="status" aria-live="polite"></p>
      <p id="fact" class="fact" aria-live="polite"></p>
      <button type="button" id="next-btn" class="primary" hidden>Next chant</button>
    </section>

    <footer class="stats" id="stats">
      <span class="stat"><strong id="stat-streak">0</strong><span>streak</span></span>
      <span class="stat"><strong id="stat-best">0</strong><span>best</span></span>
      <span class="stat"><strong id="stat-accuracy">&mdash;</strong><span>accuracy</span></span>
      <span class="stat"><strong id="stat-rounds">0</strong><span>played</span></span>
    </footer>

    <p class="hint">Pick with the mouse or keys <kbd>1</kbd>&ndash;<kbd>4</kbd>; <kbd>Enter</kbd> or <kbd>N</kbd> for the next chant.</p>
    <p class="draft-note">The notation is a first-pass draft &mdash; flag any wrong notes and they're a quick fix.</p>
  </main>

  <script src="vendor/abcjs-basic-min.js"></script>
  <script src="data/chants.js"></script>
  <script src="app.js"></script>
</body>
</html>
